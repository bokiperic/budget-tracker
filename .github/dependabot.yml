version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      svelte-ecosystem:
        patterns:
          - "svelte"
          - "vite"
          - "@sveltejs/vite-plugin-svelte"
          - "prettier-plugin-svelte"
          - "svelte-spa-router"
        update-types:
          - "major"
          - "minor"
          - "patch"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
